<div class="main-wrapper">
  <header class="glass-header d-flex align-items-center px-4">
    <div class="logo text-white fw-bold">Edu<span style="color: var(--neon-indigo);">Flow</span></div>
    <div class="ms-auto user-profile bg-dark text-light border border-secondary shadow-sm">SS</div>
  </header>

  <div class="container-fluid py-4 h-100">
    <div class="row g-4">
      
      <div class="col-lg-3">
        <div class="nav-card p-3 shadow-lg">
          <h6 class="text-muted small fw-bold mb-3 opacity-50">COMMUNICATION</h6>
          <nav>
            <button class="nav-btn" [class.active]="activeTab === 'notifications'" (click)="activeTab = 'notifications'">
              Announcements
            </button>
            <button class="nav-btn" [class.active]="activeTab === 'messaging'" (click)="activeTab = 'messaging'">
              AI Assistant
            </button>
            <button class="nav-btn" [class.active]="activeTab === 'forum'" (click)="activeTab = 'forum'">
              Community Forum
            </button>
          </nav>
        </div>
      </div>

      <div class="col-lg-9">
        <div class="content-card p-4 shadow-lg">
          
          <div *ngIf="activeTab === 'notifications'" class="fade-in">
            <h4 class="text-white fw-bold mb-4">Latest Updates</h4>
            <div *ngFor="let n of notifications" class="announcement-card p-3 rounded-4 mb-3">
              <h6 class="fw-bold" [style.color]="n.type === 'info' ? 'var(--neon-cyan)' : n.type === 'warning' ? '#fbbf24' : 'var(--neon-rose)'">
                {{n.title}}
              </h6>
              <p class="small text-white-50 mb-1">{{n.body}}</p>
              <small class="text-muted fw-bold">{{n.time}}</small>
            </div>
          </div>

          <div *ngIf="activeTab === 'messaging'" class="fade-in h-100 d-flex flex-column">
            <h4 class="text-white fw-bold mb-3">AI Support Assistant</h4>
            <div class="chat-box p-3 rounded-4 mb-3 flex-grow-1 overflow-auto" style="background: rgba(15, 23, 42, 0.5); min-height: 400px;">
              <div *ngFor="let m of chats" [ngClass]="m.sender === 'Bot' ? 'bot-wrap' : 'user-wrap'" class="d-flex mb-3">
                <div class="bubble p-3 shadow-sm">
                  <p class="m-0 small text-white">{{m.text}}</p>
                </div>
              </div>
              <div *ngIf="isTyping" class="text-muted small ms-2 animate-pulse">AI is typing...</div>
            </div>
            <div class="input-group p-2 rounded-pill bg-dark border border-secondary">
              <input type="text" class="form-control border-0 bg-transparent text-white px-3" 
                     [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" placeholder="Type your doubt...">
              <button class="btn btn-primary rounded-pill px-4" (click)="sendMessage()">Send</button>
            </div>
          </div>

          <div *ngIf="activeTab === 'forum'" class="fade-in">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="text-white fw-bold m-0">Forum Discussions</h4>
              <button class="btn btn-sm btn-outline-primary rounded-pill px-3" (click)="isFormOpen = !isFormOpen">
                {{ isFormOpen ? 'Close' : '+ New Post' }}
              </button>
            </div>

            <div *ngIf="isFormOpen" class="mb-4 p-4 rounded-4 shadow-lg fade-in forum-form-container">
  <div class="mb-3">
    <label class="text-muted small fw-bold mb-2 d-block" style="color: white !important;">TOPIC TITLE</label>
    <input type="text" 
           class="form-control bg-dark text-light border-secondary custom-input" 
           [(ngModel)]="newTopicTitle" 
           placeholder="Enter the subject of your discussion...">
  </div>

  <div class="mb-3">
    <label class="text-muted small fw-bold mb-2 d-block" style="color: white !important;">DESCRIPTION</label>
    <textarea class="form-control bg-dark text-light border-secondary custom-input" 
              rows="4" 
              [(ngModel)]="newTopicContent" 
              placeholder="Provide more details about your topic here..."></textarea>
  </div>

  <button class="btn btn-primary rounded-pill w-100 fw-bold py-2" (click)="postToForum()">
    Post to Community
  </button>
</div>
<div *ngFor="let p of forumPosts" class="forum-item p-3 mb-3 rounded-4">
              <div class="d-flex justify-content-between">
                <div>
                  <h6 class="fw-bold m-0" style="color: var(--neon-indigo);">{{p.topic}}</h6>
                  <small class="text-muted">By {{p.author}} • {{p.date}}</small>
                </div>
                <span class="badge bg-dark border border-secondary text-white-50 px-3 py-2 rounded-pill">
                  {{p.replies}} Replies
                </span>
              </div>

            
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
