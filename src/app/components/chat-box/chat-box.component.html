<div class="chat-container">
  <div class="chat-header">
    <h3>🤖 EduFlow Learning Assistant</h3>
    <span class="status-badge">Online</span>
  </div>

  <div class="chat-body">
    <div *ngFor="let msg of messages" [ngClass]="msg.sender === 'You' ? 'user-wrapper' : 'bot-wrapper'">
      <div class="message-bubble" [ngClass]="msg.sender === 'You' ? 'user-msg' : 'bot-msg'">
        <strong class="sender-title">{{ msg.sender }}</strong>
        <p class="msg-text">{{ msg.text }}</p>
        <span class="msg-time">{{ msg.time }}</span>
      </div>
    </div>

    <div *ngIf="isLoading" class="bot-wrapper">
      <div class="message-bubble bot-msg">
        <strong class="sender-title">Bot</strong>
        <p class="msg-text thinking-animation">Thinking...</p>
        <span class="msg-time">Just now</span>
      </div>
    </div>
  </div>

  <div class="chat-footer">
    <input 
      type="text" 
      [(ngModel)]="userPrompt" 
      (keyup.enter)="sendMessage()" 
      placeholder="Type your doubt here..."
      [disabled]="isLoading"
    />
    <button (click)="sendMessage()" [disabled]="isLoading || !userPrompt.trim()">
      {{ isLoading ? '...' : 'Send' }}
    </button>
  </div>
</div>
