<div class="container-fluid py-4">
  <div class="row g-4">

    <div class="col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 border-bottom">
          <h4 class="mb-0 fw-bold text-dark">{{ isEditMode() ? 'Update' : 'Create' }} Course</h4>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Course Name</label>
              <input type="text" class="form-control" formControlName="title" placeholder="Enter course title">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <select class="form-select" formControlName="category">
                <option value="" disabled>Choose category...</option>
                <option value="beginner">Beginner</option>
                <option value="professional">Professional</option>
                <option value="advanced">Advanced</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Description</label>
              <textarea class="form-control" formControlName="description" rows="5"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Image URL</label>
              <input type="text" class="form-control" formControlName="imageUrl" placeholder="Enter an URL">
            </div>

            <div class="d-flex gap-2 pt-3 border-top">
              <button type="submit" [disabled]="courseForm.invalid"
                [class]="isEditMode() ? 'btn btn-primary' : 'btn btn-success'">
                {{ isEditMode() ? 'Update Course' : 'Create Course' }}
              </button>
              @if(isEditMode()) {
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">Cancel</button>
              }
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="p-3 border-bottom bg-light d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-bold">Active Courses</h5>
          <div>
              <button ><i class="bi bi-arrow-left-short"></i></button>
              <!-- {{currentPage()}} -->
               1
              <button ><i class="bi bi-arrow-right-short"></i></button>
          </div>
          <span class="badge bg-primary">{{ courseList().length }}</span>
        </div>

        <div class="list-group list-group-flush" style="max-height: 600px; overflow-y: auto;">
          @for (course of courseList(); track course._id) {
          <div class="list-group-item p-3">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="mb-1 fw-bold">{{ course.title }}</h6>
                <span class="badge bg-success-subtle text-success border border-success-subtle">
                  {{ course.category }}
                </span>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-primary" (click)="editCourse(course)">
                  <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteCourse(course?._id??'')">
                  <i class="bi bi-trash"></i> Delete
                </button>
              </div>
            </div>
          </div>
          } @empty {
          <div class="p-5 text-center text-muted">
            <p>No courses available. Please create one.</p>
          </div>
          }
        </div>
      </div>
    </div>

  </div>
</div>
